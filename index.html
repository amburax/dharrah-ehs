    /* ── Hide code-generated decorations ── */
    .flower-tl, .deco-tr, .wave-band, .geo-wm,
    .lh-flower-tl, .lh-flower-tr, .lh-tendrils, .lh-waves, .lh-star, .lh-bubbles,
    #lh-deco { display: none !important; }
    .nav-logo > svg, .sig-block > svg { display: none !important; }
    #hero > svg,
    #hero > div[style*="pointer-events"],
    section > svg[style*="absolute"],
    section > div[style*="pointer-events"] { display: none !important; }

    /* body background set below in page-wide section */

    /* HERO decorative image overlay */
    #hero {
      background: #f5fafd !important;
      position: relative !important;
      overflow: hidden !important;
      padding-top: calc(var(--nav-h) + 100px) !important;
      padding-left: 10% !important;
    }
    #hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("images/img_715330a3.webp");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      pointer-events: none;
      z-index: 0;
    }
    .hero-inner, .hero-left, .hero-right {
      position: relative !important;
      z-index: 5 !important;
    }

    /* Footer image strip — hidden, replaced by logo */
      #footer-deco-strip { display: none !important; }

      /* Dharrah logo below WhatsApp button */
      .contact-logo-wrap {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        margin-top: 28px;
      }
      .contact-logo-img {
        width: 160px;
        height: auto;
        opacity: 1;
        background: #ffffff;
        border-radius: 8px;
        padding: 6px;
        transition: opacity 0.3s, transform 0.3s;
        display: block;
      }
      .contact-logo-img:hover { opacity: 1; transform: scale(1.04); }

    function cleanDecorations() {
      /* ── 1. Hide React decorative SVGs on all pages ── */
      ['#hero > svg','#hero > div[style*="pointer-events"]',
       'section > svg[style*="absolute"]','section > div[style*="pointer-events"]',
       '.flower-tl','.deco-tr','.wave-band','.geo-wm','#lh-deco'
      ].forEach(function(sel){
        document.querySelectorAll(sel).forEach(function(el){ el.style.display='none'; });

      var sb = document.querySelector('.sig-block');
      if (sb) sb.querySelectorAll('svg').forEach(function(s){ s.remove(); });

      /* ── 2. Hide Dancing Script Dharrah card ── */
      document.querySelectorAll('div[style*="Dancing Script"]').forEach(function(el){
        /* Walk up to find the outer flex wrapper (has marginTop and justifyContent) */
        var card = el;
        var maxUp = 6;
        while(card && maxUp-- > 0) {
          if (card.style && card.style.marginTop && card.style.justifyContent) break;
          card = card.parentElement;
        }
        if (!card || card === document.body) card = el.parentElement && el.parentElement.parentElement || el;
        if (card && card !== document.body) {
          card.style.setProperty('display','none','important');
        }
        /* Also hide the inner card box */
        var inner = el.closest ? el.closest('div[style]') : el.parentElement;
        if (inner && inner !== card) inner.style.setProperty('display','none','important');
      });

        @import url('https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;600&family=Dancing+Script:wght@500;600;700&display=swap');
        :root{--white:#ffffff;--bg:#f4f8fc;--bg2:#e8f2f9;--ink:#1a2d5a;--ink-mid:#3d5580;--ink-light:#8099bb;--red:#c8201a;--blue-fl:#3d4fcc;--border:rgba(61,85,128,0.14);--shadow:rgba(26,45,90,0.08);--nav-h:76px;}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;scroll-padding-top:calc(var(--nav-h) + 60px);}
        body{background:var(--white);color:var(--ink);font-family:'DM Sans',sans-serif;overflow-x:hidden;}

        nav{position:fixed;top:0;left:0;right:0;z-index:900;height:var(--nav-h);background:rgba(255,255,255,.96);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 5%;transition:box-shadow .3s;}
        nav.scrolled{box-shadow:0 4px 28px var(--shadow);}
        .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;cursor:pointer;}
        .brand-name{font-family:'Dancing Script',cursive;font-size:1.7rem;color:var(--red);line-height:1;font-weight:700;}
        .brand-sub{font-size:.5rem;letter-spacing:3px;color:var(--ink-light);text-transform:uppercase;}
        .nav-links{display:flex;gap:32px;list-style:none;}
        .nav-links a{color:var(--ink-mid);text-decoration:none;font-size:.7rem;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;position:relative;padding-bottom:3px;cursor:pointer;transition:color .2s;}
        .nav-links a::after{content:'';position:absolute;left:0;bottom:0;width:0;height:1.5px;background:var(--red);transition:width .3s;}
        .nav-links a:hover,.nav-links a.active-link{color:var(--red);}
        .nav-links a:hover::after,.nav-links a.active-link::after{width:100%;}
        .btn-red{display:inline-block;background:var(--red);color:#fff;padding:10px 22px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border:none;border-radius:3px;cursor:pointer;text-decoration:none;box-shadow:0 6px 22px rgba(200,32,26,.28);transition:all .3s;}
        .btn-red:hover{background:#a81812;transform:translateY(-2px);}
        .btn-outline{display:inline-block;background:transparent;color:var(--ink);padding:13px 32px;font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border:1.5px solid var(--border);border-radius:3px;cursor:pointer;text-decoration:none;transition:all .3s;}
        .btn-outline:hover{border-color:var(--red);color:var(--red);transform:translateY(-2px);}
        .hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;}
        .hamburger span{width:24px;height:1.5px;background:var(--ink);display:block;}

        .section-script{font-family:'Dancing Script',cursive;color:var(--red);font-size:1.05rem;display:block;margin-bottom:10px;}
        .section-title{font-family:'Crimson Text',serif;font-size:clamp(2rem,4vw,3rem);font-weight:600;line-height:1.15;color:var(--ink);}
        .section-title em{font-style:italic;color:var(--red);}
        .div-line{display:flex;align-items:center;gap:12px;margin:18px 0 42px;}
        .div-line .dl-r{height:2px;width:50px;background:var(--red);border-radius:2px;}
        .div-line .dl-d{width:6px;height:6px;border-radius:50%;background:var(--blue-fl);}
        .div-line .dl-l{height:1px;flex:1;background:var(--border);}
        section{padding:90px 5%;position:relative;}
        .si{max-width:1200px;margin:0 auto;}

        .flower-tl{position:absolute;top:-30px;left:-30px;width:260px;pointer-events:none;z-index:2;}
        .deco-tr{position:absolute;top:-10px;right:-10px;width:200px;pointer-events:none;z-index:2;}
        .wave-band{position:absolute;top:0;left:0;right:0;height:200px;pointer-events:none;z-index:1;overflow:hidden;}
        .geo-wm{position:absolute;width:380px;height:380px;top:50%;left:50%;transform:translate(-50%,-50%);opacity:.045;pointer-events:none;z-index:0;}

        #hero{min-height:100vh;padding:calc(var(--nav-h)+100px) 5% 80px;position:relative;overflow:hidden;background:#ffffff;}
        .hero-inner{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;z-index:3;}
        .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,32,26,.06);border:1px solid rgba(200,32,26,.2);padding:7px 16px;border-radius:20px;margin-bottom:24px;}
        .hero-badge .bdot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;}
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.5)}}
        .hero-badge span{font-size:.65rem;letter-spacing:2px;color:var(--red);text-transform:uppercase;font-weight:600;}
        .hero-h1{font-family:'Crimson Text',serif;font-size:clamp(2.8rem,5.5vw,4.8rem);font-weight:600;line-height:1.1;color:var(--ink);margin-bottom:18px;}
        .hero-h1 .hr{color:var(--red);font-style:italic;}
        .hero-p{font-size:.92rem;color:var(--ink-mid);line-height:1.8;margin-bottom:36px;max-width:480px;}
        .hero-actions{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:48px;}
        .hero-stats{display:flex;gap:32px;padding-top:28px;border-top:1px solid var(--border);flex-wrap:wrap;}
        .hs-num{font-family:'Crimson Text',serif;font-size:2.4rem;font-weight:600;color:var(--red);line-height:1;}
        .hs-lbl{font-size:.6rem;letter-spacing:2px;color:var(--ink-light);text-transform:uppercase;margin-top:4px;}
        .hero-right{position:relative;}
        .hero-card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:34px 30px;box-shadow:0 20px 60px var(--shadow);position:relative;z-index:2;}
        .hc-seal{width:54px;height:54px;margin-bottom:20px;background:rgba(200,32,26,.07);border:1px solid rgba(200,32,26,.18);border-radius:12px;display:flex;align-items:center;justify-content:center;}
        .hc-seal svg{width:28px;height:28px;stroke:var(--red);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
        .hc-tag{font-size:.6rem;letter-spacing:2px;color:var(--red);text-transform:uppercase;font-weight:600;margin-bottom:10px;}
        .hc-title{font-family:'Crimson Text',serif;font-size:1.4rem;font-weight:600;color:var(--ink);margin-bottom:12px;}
        .hc-text{font-size:.82rem;color:var(--ink-mid);line-height:1.75;margin-bottom:22px;}
        .hc-chips{display:flex;flex-wrap:wrap;gap:7px;}
        .chip{font-size:.58rem;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;background:rgba(61,79,204,.07);color:var(--blue-fl);border:1px solid rgba(61,79,204,.18);padding:5px 11px;border-radius:20px;}
        .chip.r{background:rgba(200,32,26,.07);color:var(--red);border-color:rgba(200,32,26,.2);}
        .fc{position:absolute;background:#fff;border:1px solid var(--border);border-radius:10px;padding:14px 18px;box-shadow:0 8px 28px var(--shadow);z-index:3;}
        .fc-1{top:-26px;right:-18px;}
        .fc-2{bottom:-18px;left:-22px;}
        .fc-num{font-family:'Crimson Text',serif;font-size:1.9rem;font-weight:600;color:var(--red);line-height:1;}
        .fc-lbl{font-size:.56rem;letter-spacing:1.5px;color:var(--ink-light);text-transform:uppercase;margin-top:3px;}

        #why{background:#fff;}
        .why-grid{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
        .why-pts{display:flex;flex-direction:column;gap:26px;margin-top:40px;}
        .why-pt{display:flex;gap:16px;align-items:flex-start;}
        .wpi{width:42px;height:42px;flex-shrink:0;border-radius:10px;background:rgba(200,32,26,.06);border:1px solid rgba(200,32,26,.16);display:flex;align-items:center;justify-content:center;}
        .wpi svg{width:20px;height:20px;stroke:var(--red);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
        .wp-title{font-family:'Crimson Text',serif;font-size:1.1rem;font-weight:600;color:var(--ink);margin-bottom:5px;}
        .wp-desc{font-size:.82rem;color:var(--ink-mid);line-height:1.75;}
        .why-vis{background:linear-gradient(145deg,var(--bg),var(--bg2));border:1px solid var(--border);border-radius:16px;padding:38px 30px;}
        .cert-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:26px;}
        .cert-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px 14px;text-align:center;transition:all .3s;}
        .cert-item:hover{box-shadow:0 8px 24px var(--shadow);border-color:rgba(200,32,26,.22);}
        .cert-n{font-family:'Crimson Text',serif;font-size:1.1rem;font-weight:600;color:var(--red);margin-bottom:3px;}
        .cert-d{font-size:.57rem;letter-spacing:1.5px;color:var(--ink-light);text-transform:uppercase;}
        .nums-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-radius:10px;overflow:hidden;margin-top:12px;}
        .num-cell{background:#fff;padding:20px 8px;text-align:center;}
        .num-big{font-family:'Crimson Text',serif;font-size:2rem;font-weight:600;color:var(--red);}
        .num-lbl{font-size:.55rem;letter-spacing:1.5px;color:var(--ink-light);text-transform:uppercase;margin-top:3px;}

        #industries{background:var(--bg);}
        .ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px;margin-top:50px;}
        .ind-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:28px 18px;text-align:center;cursor:default;transition:all .3s;position:relative;overflow:hidden;}
        .ind-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--red),var(--blue-fl));opacity:0;transition:opacity .3s;}
        .ind-card:hover{transform:translateY(-4px);box-shadow:0 16px 40px var(--shadow);border-color:rgba(200,32,26,.2);}
        .ind-card:hover::after{opacity:1;}
        .ind-icon{font-size:2rem;margin-bottom:12px;}
        .ind-name{font-family:'Crimson Text',serif;font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:5px;}
        .ind-desc{font-size:.59rem;letter-spacing:1.5px;color:var(--ink-light);text-transform:uppercase;}

        #cases{background:#fff;}
        .cases-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px;margin-top:50px;}
        .case-card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s;}
        .case-card:hover{transform:translateY(-4px);box-shadow:0 20px 50px var(--shadow);border-color:rgba(200,32,26,.22);}
        .case-top{padding:26px 24px 20px;border-bottom:1px solid var(--border);}
        .ctag{display:inline-block;font-size:.57rem;letter-spacing:2px;text-transform:uppercase;font-weight:600;background:rgba(200,32,26,.07);color:var(--red);border:1px solid rgba(200,32,26,.18);padding:4px 11px;border-radius:20px;margin-bottom:12px;}
        .ctag.b{background:rgba(61,79,204,.07);color:var(--blue-fl);border-color:rgba(61,79,204,.2);}
        .case-title{font-family:'Crimson Text',serif;font-size:1.15rem;font-weight:600;line-height:1.4;margin-bottom:10px;color:var(--ink);}
        .case-desc{font-size:.8rem;color:var(--ink-mid);line-height:1.7;}
        .case-bot{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
        .case-res{font-size:.73rem;color:var(--blue-fl);font-weight:600;}
        .case-ind{font-size:.57rem;letter-spacing:1.5px;color:var(--ink-light);text-transform:uppercase;}

        #contact{background:#ffffff 100%);position:relative;overflow:hidden;}
        .contact-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:80px;align-items:start;}
        .ci-list{display:flex;flex-direction:column;gap:20px;margin-top:32px;}
        .ci-item{display:flex;gap:14px;align-items:flex-start;}
        .ci-icon{width:40px;height:40px;flex-shrink:0;border-radius:10px;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px var(--shadow);}
        .ci-icon svg{width:17px;height:17px;stroke:var(--red);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
        .ci-lbl{font-size:.57rem;letter-spacing:2px;color:var(--ink-light);text-transform:uppercase;font-weight:600;margin-bottom:3px;}
        .ci-val{font-size:.88rem;color:var(--ink-mid);}
        .sig-block{margin-top:36px;padding-top:28px;border-top:1px solid var(--border);display:flex;align-items:center;gap:16px;}
        .wa-btn{display:inline-flex;align-items:center;gap:10px;background:#25D366;color:#fff;padding:12px 24px;border-radius:8px;font-size:.76rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none;margin-top:24px;box-shadow:0 6px 20px rgba(37,211,102,.28);transition:all .3s;}
        .wa-btn:hover{background:#1ebe5d;transform:translateY(-2px);}
        .form-wrap{background:#fff;border:1px solid var(--border);border-radius:16px;padding:38px 34px;box-shadow:0 20px 60px var(--shadow);}
        .form-title{font-family:'Crimson Text',serif;font-size:1.7rem;font-weight:600;color:var(--ink);margin-bottom:6px;}
        .form-sub{font-size:.8rem;color:var(--ink-mid);margin-bottom:26px;line-height:1.6;}
        .f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
        .fg{margin-bottom:15px;}
        .fg label{display:block;font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink-light);font-weight:600;margin-bottom:7px;}
        .fg input,.fg select,.fg textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);color:var(--ink);padding:11px 14px;font-family:'DM Sans',sans-serif;font-size:.84rem;border-radius:8px;outline:none;transition:border-color .3s,box-shadow .3s;-webkit-appearance:none;}
        .fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--red);box-shadow:0 0 0 3px rgba(200,32,26,.08);}
        .fg textarea{resize:vertical;min-height:108px;}
        .f-success{text-align:center;padding:26px;background:rgba(61,79,204,.06);border:1px solid rgba(61,79,204,.2);border-radius:12px;}
        .f-success .fsi{font-size:2.4rem;margin-bottom:12px;}
        .f-success p{font-family:'Crimson Text',serif;font-size:1.2rem;color:var(--blue-fl);}

        .sp-header{padding:calc(var(--nav-h)+56px) 5% 56px;position:relative;overflow:hidden;background:#ffffff;text-align:center;}
        .sp-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(200,32,26,.06);border:1px solid rgba(200,32,26,.2);padding:7px 18px;border-radius:20px;margin-bottom:22px;}
        .sp-badge .bdot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 2s infinite;}
        .sp-badge span{font-size:.65rem;letter-spacing:2px;color:var(--red);text-transform:uppercase;font-weight:600;}
        .sp-inner{position:relative;z-index:3;max-width:700px;margin:0 auto;}
        .sp-title{font-family:'Crimson Text',serif;font-size:clamp(2.4rem,5vw,3.8rem);font-weight:600;color:var(--ink);line-height:1.1;margin-bottom:16px;}
        .sp-title em{font-style:italic;color:var(--red);}
        .sp-sub{font-size:.9rem;color:var(--ink-mid);line-height:1.8;max-width:560px;margin:0 auto 28px;}

        .qnav{background:var(--bg);border-bottom:1px solid var(--border);padding:14px 5%;overflow-x:auto;white-space:nowrap;}
        .qnav-inner{max-width:1200px;margin:0 auto;display:flex;gap:10px;}
        .qpill{display:inline-block;background:#fff;border:1px solid var(--border);color:var(--ink-mid);font-size:.62rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;padding:7px 16px;border-radius:20px;text-decoration:none;cursor:pointer;transition:all .2s;flex-shrink:0;}

        .srv-wrap{padding:72px 5% 100px;background:var(--white);}

        .cat-num{font-family:'Crimson Text',serif;font-size:3.5rem;font-weight:600;color:rgba(200,32,26,.1);line-height:1;user-select:none;flex-shrink:0;width:56px;}

        .cat-title{font-family:'Crimson Text',serif;font-size:1.5rem;font-weight:600;color:var(--ink);}

        .cat-cnt{flex-shrink:0;background:rgba(200,32,26,.07);border:1px solid rgba(200,32,26,.18);color:var(--red);font-size:.65rem;font-weight:700;letter-spacing:1.5px;padding:5px 14px;border-radius:20px;text-transform:uppercase;}
        .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
        .s-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:22px 22px 22px 18px;display:flex;align-items:flex-start;gap:16px;cursor:default;position:relative;overflow:hidden;transition:all .32s;}
        .s-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--red),var(--blue-fl));transform:scaleX(0);transform-origin:left;transition:transform .36s;}
        .s-card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,var(--red),var(--blue-fl));opacity:0;transition:opacity .3s;}
        .s-card:hover{box-shadow:0 14px 40px var(--shadow);transform:translateY(-4px);border-color:rgba(200,32,26,.25);background:var(--bg);}
        .s-card:hover::before{transform:scaleX(1);}
        .s-card:hover::after{opacity:1;}
        .s-ico{width:42px;height:42px;flex-shrink:0;border-radius:10px;background:rgba(200,32,26,.06);border:1px solid rgba(200,32,26,.14);display:flex;align-items:center;justify-content:center;transition:background .3s;}
        .s-card:hover .s-ico{background:rgba(200,32,26,.1);}
        .s-ico svg{width:20px;height:20px;stroke:var(--red);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
        .s-name{font-family:'Crimson Text',serif;font-size:1.05rem;font-weight:600;color:var(--ink);margin-bottom:5px;line-height:1.35;}
        .s-tag{font-size:.6rem;letter-spacing:1.5px;color:var(--ink-light);text-transform:uppercase;}
        .cat-divider{display:flex;align-items:center;gap:16px;margin-bottom:64px;opacity:.5;}
        .cat-divider::before,.cat-divider::after{content:'';flex:1;height:1px;background:var(--border);}
        .cd-d{width:8px;height:8px;background:var(--red);transform:rotate(45deg);}

        .srv-cta{background:#f8f8f8 100%);border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:56px 5%;text-align:center;position:relative;overflow:hidden;}
        .srv-cta-inner{position:relative;z-index:1;}
        .cta-actions{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
        .btn-outline-r{display:inline-block;background:transparent;color:var(--red);padding:13px 32px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;border:1.5px solid var(--red);border-radius:3px;cursor:pointer;text-decoration:none;transition:all .3s;}
        .btn-outline-r:hover{background:rgba(200,32,26,.07);transform:translateY(-2px);}

        footer{background:var(--ink);color:#fff;padding:48px 5% 28px;position:relative;overflow:hidden;}
        footer::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--red),var(--blue-fl));}
        .ft-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:24px;}
        .ft-brand .fn{font-family:'Dancing Script',cursive;font-size:1.8rem;color:#fff;}
        .ft-brand .fn span{color:#e87a76;}
        .ft-links{display:flex;gap:28px;list-style:none;}
        .ft-links a{color:rgba(255,255,255,.45);font-size:.67rem;letter-spacing:2px;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:color .2s;}
        .ft-links a:hover{color:#e87a76;}
        .ft-bot{max-width:1200px;margin:28px auto 0;padding-top:22px;border-top:1px solid rgba(255,255,255,.08);text-align:center;}
        .ft-bot p{color:rgba(255,255,255,.28);font-size:.6rem;letter-spacing:1.5px;}

        @media(max-width:900px){
          .hero-inner{grid-template-columns:1fr;}.hero-right{display:none;}

          .contact-grid{grid-template-columns:1fr;gap:44px;}
          .f-row{grid-template-columns:1fr;}
          .nav-links{display:none;}.hamburger{display:flex;}
        }
        @media(max-width:640px){
          section{padding:66px 5%;}
          .cases-grid{grid-template-columns:1fr;}
          .cards-grid{grid-template-columns:1fr;}
        }

<script id="wa-hours-script">
(function () {
  /* Business hours: Mon–Sat, 09:00–18:00 IST */
  function isOpen() {
    /* IST = UTC+5:30 */
    var now = new Date();
    var utc = now.getTime() + now.getTimezoneOffset() * 60000;
    var ist = new Date(utc + 5.5 * 3600000);
    var day  = ist.getDay();   /* 0=Sun, 1=Mon … 6=Sat */
    var hour = ist.getHours();
    var min  = ist.getMinutes();
    var totalMin = hour * 60 + min;
    /* Mon-Sat (1-6), 9:00 (540) to 18:00 (1080) */
    return day >= 1 && day <= 6 && totalMin >= 540 && totalMin < 1080;
  }

  function applyHoursState() {
    var btn = document.querySelector('a.wa-btn');
    if (!btn) return;

    /* Wrap once */
    if (!btn.parentElement.classList.contains('wa-btn-wrapper')) {
      var wrapper = document.createElement('span');
      wrapper.className = 'wa-btn-wrapper';
      btn.parentNode.insertBefore(wrapper, btn);
      wrapper.appendChild(btn);

      /* Tooltip element */
      var tip = document.createElement('span');
      tip.className = 'wa-tooltip';
      tip.textContent = 'Available Monday – Saturday, 9 AM to 6 PM (IST)';
      wrapper.appendChild(tip);
    }

    var open = isOpen();
    if (open) {
      btn.classList.remove('wa-offline');
      btn.removeAttribute('data-blocked');
      /* Restore original href */
      if (btn.dataset.href) {
        btn.href = btn.dataset.href;
        btn.target = '_blank';
      }
      /* Hide tooltip */
      var tip = btn.parentElement.querySelector('.wa-tooltip');
      if (tip) tip.style.display = '';
    } else {
      /* Store href and disable */
      if (!btn.dataset.href) btn.dataset.href = btn.href;
      btn.href = 'javascript:void(0)';
      btn.removeAttribute('target');
      btn.setAttribute('data-blocked', '1');
      btn.classList.add('wa-offline');
      /* Show tooltip always on hover (CSS handles that) */
    }
  }

  /* Block click explicitly too */
  document.addEventListener('click', function (e) {
    var btn = e.target.closest('a.wa-btn');
    if (btn && btn.getAttribute('data-blocked')) {
      e.preventDefault();
      e.stopPropagation();
    }
  }, true);

  /* Run on load and every 60s */
  document.addEventListener('DOMContentLoaded', function () {
    applyHoursState();
    setInterval(applyHoursState, 60000);
  });
  /* Also run after React renders (delayed) */
  window.addEventListener('load', function () {
    applyHoursState();
    setTimeout(applyHoursState, 800);
    setTimeout(applyHoursState, 2000);
    setInterval(applyHoursState, 60000);
  });
})();
</script>

<script id="four-features-script">
(function () {

  /* ════════════════════════════════
     1. SCROLL PROGRESS BAR
  ════════════════════════════════ */
  function buildProgressBar() {
    if (document.getElementById('scroll-progress-bar')) return;
    var bar = document.createElement('div');
    bar.id = 'scroll-progress-bar';
    document.body.appendChild(bar);

    function updateBar() {
      var scrollTop  = window.scrollY || document.documentElement.scrollTop;
      var docHeight  = document.documentElement.scrollHeight - window.innerHeight;
      var pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
      bar.style.width = Math.min(pct, 100) + '%';
    }
    window.addEventListener('scroll', updateBar, { passive: true });
    updateBar();
  }

  /* ════════════════════════════════
     2. COUNTER ANIMATION
  ════════════════════════════════ */
  function animateCount(el, target, suffix, duration) {
    var start = 0;
    var startTime = null;
    var isFloat = target % 1 !== 0;

    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      var progress = Math.min((timestamp - startTime) / duration, 1);
      /* Ease-out cubic */
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = eased * target;
      el.textContent = (isFloat ? current.toFixed(1) : Math.floor(current)) + suffix;
      if (progress < 1) requestAnimationFrame(step);
      else el.textContent = target + suffix;
    }
    requestAnimationFrame(step);
  }

  function parseNum(text) {
    /* Returns { value, suffix } e.g. "93%" → { value:93, suffix:'%' } */
    var m = text.trim().match(/^([\d.]+)(.*)$/);
    if (!m) return null;
    return { value: parseFloat(m[1]), suffix: m[2] || '' };
  }

  function initCounters() {
    /* Target common counter class names used in the site */
    var selectors = [
      '.fc-num', '.hs-num', '.stat-num', '.counter-num',
      '[class*="fc-num"]', '[class*="hs-num"]', '[class*="stat-val"]'
    ];
    var els = [];
    selectors.forEach(function (sel) {
      try {
        document.querySelectorAll(sel).forEach(function (el) {
          if (!el.dataset.countDone) els.push(el);
        });
      } catch(e) {}
    });

    if (els.length === 0) return;

    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          var el = entry.target;
          if (el.dataset.countDone) return;
          el.dataset.countDone = '1';
          var parsed = parseNum(el.textContent);
          if (!parsed) return;
          el.textContent = '0' + parsed.suffix;
          animateCount(el, parsed.value, parsed.suffix, 1600);
          observer.unobserve(el);
        }
      });
    }, { threshold: 0.4 });

    els.forEach(function (el) { observer.observe(el); });
  }

  /* ════════════════════════════════
     3. SMOOTH SCROLL FOR NAV LINKS
  ════════════════════════════════ */
  function initSmoothScroll() {
    document.addEventListener('click', function (e) {
      var link = e.target.closest('a[href^="#"]');
      if (!link) return;
      var hash = link.getAttribute('href');
      if (!hash || hash === '#') {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      var target = document.querySelector(hash);
      if (!target) return;
      e.preventDefault();
      var navH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 70;
      var top = target.getBoundingClientRect().top + window.scrollY - navH - 12;
      window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
    }, false);

    /* Also handle qnav section tabs (the quick-nav with section names) */
    document.addEventListener('click', function (e) {
      var btn = e.target.closest('.qnav-item, .qnav a, [data-section]');
      if (!btn) return;
      var sectionId = btn.dataset.section || (btn.getAttribute('href') || '').replace('#', '');
      if (!sectionId) return;
      var target = document.getElementById(sectionId);
      if (!target) return;
      var navH = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--nav-h')) || 70;
      var top = target.getBoundingClientRect().top + window.scrollY - navH - 12;
      setTimeout(function () {
        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });
      }, 10);
    }, false);
  }

  /* ════════════════════════════════
     4. UPDATE FLOATING WA MSG
        (the floating button may not
        yet exist at script parse time)
  ════════════════════════════════ */
  function patchFloatingWA() {
    var btn = document.getElementById('float-wa-btn');
    if (btn && btn.href && btn.href.indexOf('?text=') === -1 && btn.href.indexOf('wa.me') !== -1) {
      var msg = encodeURIComponent("Hi, I need help with EHS compliance for my industry in Gujarat. Could you please guide me?");
      btn.href = btn.href.split('?')[0] + '?text=' + msg;
      if (btn.dataset && btn.dataset.href) {
        btn.dataset.href = btn.dataset.href.split('?')[0] + '?text=' + msg;
      }
    }
  }

  /* ── Init everything ── */
  function init() {
    buildProgressBar();
    initSmoothScroll();
    initCounters();
    patchFloatingWA();
    /* Re-run counters after React renders dynamic content */
    setTimeout(initCounters, 600);
    setTimeout(initCounters, 1500);
    setTimeout(patchFloatingWA, 800);
    setTimeout(patchFloatingWA, 2000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
  window.addEventListener('load', function () { setTimeout(init, 400); });

})();
</script>

<script>
/* ── Phone field v2: custom dropdown + WhatsApp intercept ── */
(function () {

  var CODES = [
    {code:'+91',  iso:'IN', flag:'🇮🇳'},
    {code:'+1',   iso:'US', flag:'🇺🇸'},
    {code:'+44',  iso:'UK', flag:'🇬🇧'},
    {code:'+971', iso:'AE', flag:'🇦🇪'},
    {code:'+966', iso:'SA', flag:'🇸🇦'},
    {code:'+974', iso:'QA', flag:'🇶🇦'},
    {code:'+965', iso:'KW', flag:'🇰🇼'},
    {code:'+973', iso:'BH', flag:'🇧🇭'},
    {code:'+968', iso:'OM', flag:'🇴🇲'},
    {code:'+61',  iso:'AU', flag:'🇦🇺'},
    {code:'+49',  iso:'DE', flag:'🇩🇪'},
    {code:'+33',  iso:'FR', flag:'🇫🇷'},
    {code:'+81',  iso:'JP', flag:'🇯🇵'},
    {code:'+65',  iso:'SG', flag:'🇸🇬'},
    {code:'+60',  iso:'MY', flag:'🇲🇾'},
    {code:'+92',  iso:'PK', flag:'🇵🇰'},
    {code:'+880', iso:'BD', flag:'🇧🇩'},
    {code:'+94',  iso:'LK', flag:'🇱🇰'},
    {code:'+27',  iso:'ZA', flag:'🇿🇦'},
    {code:'+55',  iso:'BR', flag:'🇧🇷'},
  ];

  var selected = CODES[0]; /* Default: India +91 */

  /* ── 1. WhatsApp intercept ── */
  var _orig = window.open;
  window.open = function (url, target, features) {
    if (url && url.indexOf('wa.me') !== -1 && url.indexOf('text=') !== -1) {
      var numI = document.getElementById('dharrah-phone-num');
      if (numI && numI.value.trim()) {
        var digits = numI.value.trim().replace(/[^0-9]/g, '');
        var fullPhone = selected.code + ' ' + digits;
        url = url.replace('text=', 'text=' + encodeURIComponent('*Phone:* ' + fullPhone + '
'));
      }
    }
    return _orig.apply(window, arguments);
  };

  /* ── 2. Build dropdown HTML ── */
  function buildRow() {
    var row = document.createElement('div');
    row.id = 'dharrah-phone-row';
    row.className = 'f-row';

    var label = document.createElement('div');
    label.className = 'fg';
    label.style.flex = '1';

    var lbl = document.createElement('span');
    lbl.className = 'dp-label';
    lbl.textContent = 'Phone Number';

    var wrapper = document.createElement('div');
    wrapper.id = 'dharrah-phone-wrapper';

    /* Trigger button */
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.id = 'dharrah-cc-btn';
    btn.innerHTML = selected.flag + ' ' + selected.code + ' (' + selected.iso + ') <span class="cc-arrow">&#9660;</span>';

    /* Dropdown list */
    var list = document.createElement('div');
    list.id = 'dharrah-cc-list';

    CODES.forEach(function(c) {
      var opt = document.createElement('div');
      opt.className = 'dharrah-cc-opt' + (c.iso === selected.iso ? ' active' : '');
      opt.innerHTML =
        '<span class="opt-flag">' + c.flag + '</span>' +
        '<span class="opt-code">' + c.code + '</span>' +
        '<span class="opt-iso">(' + c.iso + ')</span>';
      opt.addEventListener('click', function(e) {
        e.stopPropagation();
        selected = c;
        btn.innerHTML = c.flag + ' ' + c.code + ' (' + c.iso + ') <span class="cc-arrow">&#9660;</span>';
        list.querySelectorAll('.dharrah-cc-opt').forEach(function(o){ o.classList.remove('active'); });
        opt.classList.add('active');
        list.classList.remove('open');
        btn.classList.remove('open');
        document.getElementById('dharrah-phone-num').focus();
      });
      list.appendChild(opt);
    });

    /* Toggle */
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var open = list.classList.toggle('open');
      btn.classList.toggle('open', open);
    });

    /* Close on outside click */
    document.addEventListener('click', function() {
      list.classList.remove('open');
      btn.classList.remove('open');
    });

    /* Number input */
    var numInput = document.createElement('input');
    numInput.id = 'dharrah-phone-num';
    numInput.type = 'tel';
    numInput.placeholder = 'XXXXX XXXXX';

    wrapper.appendChild(btn);
    wrapper.appendChild(list);
    wrapper.appendChild(numInput);
    label.appendChild(lbl);
    label.appendChild(wrapper);
    row.appendChild(label);
    return row;
  }

  /* ── 3. Inject into the contact form ── */
  function inject() {
    var forms = document.querySelectorAll('form');
    forms.forEach(function(form) {
      if (!form.querySelector('input[type="email"]') || !form.querySelector('textarea')) return;
      if (document.getElementById('dharrah-phone-row')) return;
      var rows = form.querySelectorAll('.f-row');
      var phoneRow = buildRow();
      if (rows.length > 0) {
        rows[0].parentNode.insertBefore(phoneRow, rows[1] || null);
      } else {
        form.insertBefore(phoneRow, form.firstChild);
      }
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', inject);
  } else { inject(); }
  [300, 800, 1500, 2500].forEach(function(ms){ setTimeout(inject, ms); });
})();
</script>

  <script id="dharrah-contact-automation">
    /* 
       Contact Form Automation Bridge
       Intercepts form submission and routes to Cloudflare Worker
    */
    (function() {
      function setupBridge() {
        // Find the main contact form
        const form = document.querySelector('form');
        if (!form || form.dataset.bridgeSet === 'true') return;

        // Prevent multiple listeners
        form.dataset.bridgeSet = 'true';

        form.addEventListener('submit', async function(e) {
          // Stop React's WhatsApp redirect
          e.stopImmediatePropagation();
          e.preventDefault();

          // Gather data using placeholders identified during inspection
          const formData = {
            name: form.querySelector('input[placeholder="Full Name"]')?.value || '',
            company: form.querySelector('input[placeholder="Company Name"]')?.value || '',
            phone: form.querySelector('input[placeholder="+91 XXXXX XXXXX"]')?.value || '',
            email: form.querySelector('input[placeholder="you@company.com"]')?.value || '',
            subject: form.querySelector('select')?.value || 'General Inquiry',
            message: form.querySelector('textarea')?.value || ''
          };

          // UI Feedback
          const btn = form.querySelector('button.btn-red') || form.querySelector('button[type="submit"]');
          const originalText = btn.innerHTML;
          btn.innerHTML = 'Sending...';
          btn.disabled = true;

          try {
            const response = await fetch('https://quiet-poetry-e97c.amburax.workers.dev', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(formData)
            });

            if (response.ok) {
              alert('Successfully Sent! Your inquiry has been received at info@dharrahehs.com.');
              form.reset();
            } else {
              throw new Error('Worker Error');
            }
          } catch (err) {
            console.error('Automation error:', err);
            alert('Service temporary busy. Please try contacting us via WhatsApp for urgent matters.');
          } finally {
            btn.innerHTML = originalText;
            btn.disabled = false;
          }
        }, true); // Intercept in capture phase
      }

      // Initialize and retry for late hydration
      setupBridge();
      [500, 1500, 3000].forEach(t => setTimeout(setupBridge, t));
    })();
  </script>
